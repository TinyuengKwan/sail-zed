id = "sail"
name = "Sail"
description = "Sail language support."
version = "0.1.0"
schema_version = 1
authors = ["Tinyueng Kwan <kwantinyueng@gmail.com>"]
repository = "https://github.com/TinyuengKwan/sail-zed"

[language_servers.sail_lsp]
name = "sail-lsp"
languages = ["Sail"]

[[capabilities]]
kind = "process:exec"
command = "*"
args = ["**"]

[[capabilities]]
kind = "download_file"
host = "github.com"
path = ["TinyuengKwan", "sail-lsp", "**"]

[[capabilities]]
kind = "download_file"
host = "release-assets.githubusercontent.com"
path = ["**"]

[grammars.sail]
repository = "https://github.com/TinyuengKwan/tree-sitter-sail"
rev = "735cf32d5320990c77fce5894e2212551bb45052"
path = "grammars/sail"
